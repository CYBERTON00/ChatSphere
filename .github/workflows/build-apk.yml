name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Install Capacitor
        working-directory: client
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add Android platform
        working-directory: client
        run: npx cap add android || echo "Platform already exists"

      - name: Sync web to Android
        working-directory: client
        run: npx cap sync android

      - name: Build APK
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chatsphere-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
